<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#C1272D" />
    <link rel="icon" type="image/png" href="/roznama-logo.png" />
    <link rel="apple-touch-icon" href="/roznama-logo.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="روزنامة" />
    <title>روزنامة · Roznama</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Aref+Ruqaa:wght@400;700&family=Reem+Kufi:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Self-heal: if the app hasn't mounted a few seconds after load (e.g. a
      // stale service worker served an old shell), clear caches/SWs and reload
      // once so the user never gets stuck on a blank screen.
      (function () {
        function heal() {
          try {
            var root = document.getElementById("root");
            if (root && root.children.length === 0 && !sessionStorage.getItem("rz_healed")) {
              sessionStorage.setItem("rz_healed", "1");
              if ("serviceWorker" in navigator) {
                navigator.serviceWorker.getRegistrations().then(function (rs) {
                  rs.forEach(function (r) { r.unregister(); });
                });
              }
              if (window.caches && caches.keys) {
                caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); });
              }
              setTimeout(function () { location.reload(); }, 400);
            }
          } catch (e) {}
        }
        window.addEventListener("load", function () { setTimeout(heal, 4000); });
      })();
    </script>
  </body>
</html>
